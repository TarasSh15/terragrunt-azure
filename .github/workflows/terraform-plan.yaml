name: Terragrunt Azure Validate & Plan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  TG_VERSION: "0.67.16"
  TF_VERSION: "1.6.6"

jobs:
  terragrunt:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, ppd, prod]

    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sSL -o terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt

      - name: Terragrunt Init
        working-directory: terraform/stages/${{ matrix.environment }}
        run: terragrunt init --terragrunt-non-interactive

      - name: Terragrunt Validate
        working-directory: terraform/stages/${{ matrix.environment }}
        run: terragrunt validate --terragrunt-non-interactive

      - name: Terragrunt Plan
        working-directory: terraform/stages/${{ matrix.environment }}
        run: terragrunt plan -no-color --terragrunt-non-interactive